<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alapa Finance — Сайт в разработке</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --navy-950: #0B1120;
      --navy-900: #111827;
      --navy-800: #1A2332;
      --gold-500: #C8956C;
      --gold-400: #D4A87A;
      --gold-300: #E0BC92;
      --gold-600: #B07D55;
      --slate-400: #8494a7;
      --slate-300: #c0c8d4;
      --white: #f0f2f5;
      --glass-bg: rgba(18, 26, 42, 0.5);
      --glass-border: rgba(180, 195, 215, 0.08);
      --glass-blur: blur(24px) saturate(180%);
      --font-primary: 'Space Grotesk', 'Inter', -apple-system, sans-serif;
      --font-body: 'Inter', -apple-system, sans-serif;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: var(--font-body);
      background: var(--navy-950);
      color: var(--white);
    }

    /* === BACKGROUND === */
    .bg {
      position: fixed; inset: 0;
      overflow: hidden;
      z-index: 0;
    }

    .bg-gradient {
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 30%, rgba(200,149,108,0.06) 0%, transparent 70%),
        radial-gradient(ellipse 60% 50% at 20% 80%, rgba(59,108,181,0.04) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 80% 70%, rgba(200,149,108,0.03) 0%, transparent 50%),
        var(--navy-950);
    }

    /* Floating geometric shapes */
    .geo {
      position: absolute;
      border: 1px solid rgba(200,149,108,0.06);
      opacity: 0;
      animation: geo-float 20s ease-in-out infinite;
    }
    .geo-1 { width: 300px; height: 300px; border-radius: 50%; top: -80px; right: -60px; animation-delay: 0s; }
    .geo-2 { width: 200px; height: 200px; border-radius: 50%; bottom: -40px; left: -40px; animation-delay: 4s; }
    .geo-3 {
      width: 0; height: 0;
      border-left: 100px solid transparent; border-right: 100px solid transparent;
      border-bottom: 173px solid rgba(200,149,108,0.03);
      top: 20%; left: 10%; animation-delay: 8s; border: none;
      background: none;
    }
    .geo-3::after {
      content: '';
      position: absolute;
      width: 0; height: 0;
      border-left: 100px solid transparent; border-right: 100px solid transparent;
      border-bottom: 173px solid transparent;
      border-bottom-color: rgba(200,149,108,0.03);
      top: -60px; left: -100px;
    }
    .geo-4 { width: 150px; height: 150px; border-radius: 50%; top: 60%; right: 10%; animation-delay: 12s; }
    .geo-5 { width: 400px; height: 400px; border-radius: 50%; top: 40%; left: 50%; transform: translateX(-50%); animation-delay: 6s; border-color: rgba(59,108,181,0.04); }

    @keyframes geo-float {
      0%, 100% { opacity: 0; transform: translateY(0) scale(1); }
      25% { opacity: 1; }
      50% { opacity: 1; transform: translateY(-20px) scale(1.05); }
      75% { opacity: 1; }
    }

    /* Subtle grid */
    .grid-overlay {
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(200,149,108,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(200,149,108,0.02) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(ellipse 70% 70% at 50% 50%, black 20%, transparent 70%);
    }

    /* === MAIN CONTENT === */
    .main {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      padding: 2rem;
      text-align: center;
    }

    /* === LOGO === */
    .logo-wrap {
      margin-bottom: 3rem;
      opacity: 0;
      animation: fade-up 1s cubic-bezier(0.22, 1, 0.36, 1) 0.3s forwards;
    }

    .logo-svg {
      width: 160px;
      height: auto;
      display: block;
      margin: 0 auto;
      filter: drop-shadow(0 0 30px rgba(200,149,108,0.15));
    }

    .logo-svg .chevron-stroke {
      stroke-dasharray: 200;
      stroke-dashoffset: 200;
      animation: draw-chevron 1.8s cubic-bezier(0.22, 1, 0.36, 1) 0.5s forwards;
    }

    .logo-svg .underline-stroke {
      stroke-dasharray: 60;
      stroke-dashoffset: 60;
      animation: draw-line 1s cubic-bezier(0.22, 1, 0.36, 1) 1.6s forwards;
    }

    .logo-svg .logo-text-alapa {
      opacity: 0;
      animation: fade-in 0.8s ease 2s forwards;
    }

    .logo-svg .logo-text-finance {
      opacity: 0;
      animation: fade-in 0.8s ease 2.3s forwards;
    }

    @keyframes draw-chevron {
      to { stroke-dashoffset: 0; }
    }
    @keyframes draw-line {
      to { stroke-dashoffset: 0; }
    }
    @keyframes fade-in {
      to { opacity: 1; }
    }
    @keyframes fade-up {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Glow pulse behind chevron */
    .logo-glow {
      animation: glow-pulse 4s ease-in-out infinite 2.5s;
    }
    @keyframes glow-pulse {
      0%, 100% { opacity: 0; }
      50% { opacity: 0.6; }
    }

    /* === GLASS CARD === */
    .glass-card {
      background: var(--glass-bg);
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 3rem 3.5rem;
      max-width: 640px;
      width: 100%;
      position: relative;
      overflow: hidden;
      opacity: 0;
      animation: fade-up 1s cubic-bezier(0.22, 1, 0.36, 1) 0.6s forwards;
    }

    .glass-card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 24px;
      padding: 1px;
      background: linear-gradient(135deg, rgba(200,149,108,0.15), transparent 50%, rgba(200,149,108,0.05));
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask-composite: exclude;
      -webkit-mask-composite: xor;
      pointer-events: none;
    }

    .notice-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(200,149,108,0.1);
      border: 1px solid rgba(200,149,108,0.2);
      border-radius: 100px;
      padding: 6px 18px;
      font-family: var(--font-primary);
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--gold-400);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 1.5rem;
    }

    .notice-badge::before {
      content: '';
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--gold-500);
      animation: pulse-dot 2s ease-in-out infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 0.4; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.3); }
    }

    .notice-title {
      font-family: var(--font-primary);
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--white);
      line-height: 1.4;
      margin-bottom: 1.25rem;
    }

    .notice-text {
      font-family: var(--font-body);
      font-size: 1rem;
      color: var(--slate-400);
      line-height: 1.7;
      margin-bottom: 2rem;
    }

    /* === TRANSITION ANIMATION === */
    .transition-block {
      position: relative;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      border-radius: 16px;
      background: rgba(11,17,32,0.6);
      border: 1px solid rgba(200,149,108,0.08);
    }

    .company-name {
      position: absolute;
      font-family: var(--font-primary);
      font-size: 1.15rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      white-space: nowrap;
    }

    .old-name {
      color: var(--slate-400);
      animation: name-cycle 6s ease-in-out infinite;
    }

    .arrow-morph {
      position: absolute;
      display: flex;
      align-items: center;
      gap: 6px;
      opacity: 0;
      animation: arrow-cycle 6s ease-in-out infinite;
    }

    .arrow-morph svg {
      width: 24px; height: 24px;
    }

    .new-name {
      color: var(--gold-400);
      animation: new-name-cycle 6s ease-in-out infinite;
    }

    /* Old name: visible 0-30%, fade out 30-40% */
    @keyframes name-cycle {
      0% { opacity: 1; transform: translateY(0); }
      30% { opacity: 1; transform: translateY(0); }
      40% { opacity: 0; transform: translateY(-20px); }
      90% { opacity: 0; transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* Arrow: appear 38-42%, visible 42-55%, disappear 55-60% */
    @keyframes arrow-cycle {
      0%, 37% { opacity: 0; transform: scale(0.5); }
      42% { opacity: 1; transform: scale(1); }
      55% { opacity: 1; transform: scale(1); }
      60% { opacity: 0; transform: scale(0.5); }
      100% { opacity: 0; }
    }

    /* New name: appear 50-60%, visible 60-82%, disappear 82-90% */
    @keyframes new-name-cycle {
      0%, 50% { opacity: 0; transform: translateY(20px); }
      60% { opacity: 1; transform: translateY(0); }
      82% { opacity: 1; transform: translateY(0); }
      90% { opacity: 0; transform: translateY(-20px); }
      100% { opacity: 0; }
    }

    /* Progress bar at bottom of transition block */
    .transition-progress {
      position: absolute;
      bottom: 0; left: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--gold-600), var(--gold-400), var(--gold-300));
      border-radius: 0 2px 2px 0;
      animation: progress-sweep 6s linear infinite;
    }

    @keyframes progress-sweep {
      0% { width: 0; opacity: 0.5; }
      40% { width: 50%; opacity: 1; }
      60% { width: 50%; opacity: 1; }
      90% { width: 100%; opacity: 1; }
      95% { width: 100%; opacity: 0; }
      100% { width: 0; opacity: 0; }
    }

    /* === CONTACT LINE === */
    .contact-line {
      margin-top: 2rem;
      font-size: 0.85rem;
      color: var(--slate-400);
      opacity: 0;
      animation: fade-up 1s cubic-bezier(0.22, 1, 0.36, 1) 1s forwards;
    }

    .contact-line a {
      color: var(--gold-400);
      text-decoration: none;
      border-bottom: 1px solid rgba(200,149,108,0.3);
      transition: border-color 0.3s ease;
    }

    .contact-line a:hover {
      border-color: var(--gold-400);
    }

    /* === FOOTER === */
    .footer-line {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.75rem;
      color: var(--slate-400);
      opacity: 0.4;
      font-family: var(--font-primary);
      letter-spacing: 0.06em;
      white-space: nowrap;
      z-index: 1;
    }

    /* === RESPONSIVE === */
    @media (max-width: 640px) {
      .glass-card {
        padding: 2rem 1.5rem;
        border-radius: 20px;
      }
      .notice-title {
        font-size: 1.25rem;
      }
      .logo-svg {
        width: 120px;
      }
      .company-name {
        font-size: 0.95rem;
      }
      .transition-block {
        height: 48px;
      }
    }
  </style>
</head>
<body>

  <!-- Background -->
  <div class="bg">
    <div class="bg-gradient"></div>
    <div class="grid-overlay"></div>
    <div class="geo geo-1"></div>
    <div class="geo geo-2"></div>
    <div class="geo geo-3"></div>
    <div class="geo geo-4"></div>
    <div class="geo geo-5"></div>
  </div>

  <!-- Main -->
  <div class="main">

    <!-- Logo with draw-on animation -->
    <div class="logo-wrap">
      <svg class="logo-svg" viewBox="0 0 200 130" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Glow -->
        <ellipse class="logo-glow" cx="100" cy="52" rx="50" ry="30" fill="url(#glow_g)" opacity="0"/>
        <!-- Chevron — 100-degree angle -->
        <path class="chevron-stroke" d="M40 30 L100 75 L160 30" stroke="url(#chev_g)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
        <!-- Underline -->
        <line class="underline-stroke" x1="65" y1="86" x2="135" y2="86" stroke="rgba(200,149,108,0.35)" stroke-width="1.5" stroke-linecap="round"/>
        <!-- ALAPA -->
        <text class="logo-text-alapa" x="100" y="103" text-anchor="middle" fill="url(#text_g)" font-family="'Space Grotesk','Helvetica Neue',sans-serif" font-size="18" font-weight="600" letter-spacing="8">ALAPA</text>
        <!-- FINANCE -->
        <text class="logo-text-finance" x="100" y="119" text-anchor="middle" fill="rgba(200,149,108,0.5)" font-family="'Space Grotesk','Helvetica Neue',sans-serif" font-size="9" font-weight="400" letter-spacing="5">FINANCE</text>
        <defs>
          <linearGradient id="chev_g" x1="40" y1="30" x2="160" y2="30">
            <stop offset="0%" stop-color="#D4A87A"/>
            <stop offset="50%" stop-color="#C8956C"/>
            <stop offset="100%" stop-color="#D4A87A"/>
          </linearGradient>
          <linearGradient id="text_g" x1="60" y1="100" x2="140" y2="100">
            <stop offset="0%" stop-color="#E0BC92"/>
            <stop offset="50%" stop-color="#D4A87A"/>
            <stop offset="100%" stop-color="#E0BC92"/>
          </linearGradient>
          <radialGradient id="glow_g" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="rgba(200,149,108,0.25)"/>
            <stop offset="100%" stop-color="transparent"/>
          </radialGradient>
        </defs>
      </svg>
    </div>

    <!-- Glass Card -->
    <div class="glass-card">
      <div class="notice-badge">Уведомление</div>

      <h1 class="notice-title">Сайт находится в&nbsp;разработке</h1>

      <p class="notice-text">
        Специальное уведомление для регистрирующего органа: данный сайт находится в&nbsp;стадии разработки.
        Перезапуск состоится после завершения перерегистрации компании.
      </p>

      <!-- Zharyk IT → Alapa Finance transition -->
      <div class="transition-block">
        <span class="company-name old-name">ТОО «Жарык IT»</span>
        <div class="arrow-morph">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" color="#C8956C">
            <path d="M5 12h14M13 6l6 6-6 6"/>
          </svg>
        </div>
        <span class="company-name new-name">ТОО «Alapa Finance»</span>
        <div class="transition-progress"></div>
      </div>

      <p class="contact-line">
        По вопросам: <a href="mailto:info@alapafinance.com">info@alapafinance.com</a>
      </p>
    </div>

    <div class="footer-line">&copy; 2025 Alapa Finance LLP</div>
  </div>

</body>
</html>
